<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Rainback · Admin</title>
<style>
  :root{
    --sand:#F2EADC; --sand-w:#FAF6EE; --ink:#2A1F17; --ink-s:#5A4A3A;
    --terracotta:#C5572C; --tc:#C5572C; --olive:#6B7A4F; --ochre:#C89B4F;
    --smoke:#8E7D6B; --line:#E2D7C3; --line-s:#CDBFa8;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Inter Tight',-apple-system,sans-serif;background:var(--sand);color:var(--ink);min-height:100vh}
  .wrap{max-width:1000px;margin:0 auto;padding:28px 22px 60px}

  /* ── LOGIN ── */
  #login-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
  .login-card{width:100%;max-width:380px;background:var(--sand-w);border:1px solid var(--line);border-radius:18px;padding:36px 30px}
  .logo{font-family:Georgia,serif;font-size:22px;font-weight:600;margin-bottom:4px}
  .logo span{color:var(--terracotta)}
  .badge{font-family:'JetBrains Mono',monospace;font-size:9px;text-transform:uppercase;letter-spacing:.18em;color:var(--smoke);margin-bottom:24px}
  h1{font-family:Georgia,serif;font-size:26px;font-weight:400;letter-spacing:-.5px;margin-bottom:6px}
  h1 em{font-style:italic;color:var(--terracotta)}
  .sub{font-size:13.5px;color:var(--smoke);margin-bottom:22px;line-height:1.5}
  .err{background:rgba(197,87,44,.1);color:#9E4220;font-size:13px;padding:10px 14px;border-radius:8px;margin-bottom:14px;display:none}
  .err.show{display:block}
  input{width:100%;padding:13px 16px;background:#fff;border:1px solid var(--line);border-radius:9px;font-family:inherit;font-size:15px;color:var(--ink);outline:none;margin-bottom:12px;transition:border-color .2s}
  input:focus{border-color:var(--terracotta)}
  .btn{width:100%;padding:14px;background:var(--ink);color:var(--sand);border:none;border-radius:100px;font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;transition:background .2s}
  .btn:hover{background:var(--terracotta)}
  .btn:disabled{opacity:.6;cursor:default}

  /* ── DASHBOARD ── */
  #admin-screen{display:none}
  .topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:26px;padding-bottom:18px;border-bottom:1.5px solid var(--line)}
  .topbar-r{display:flex;align-items:center;gap:14px}
  .who{font-size:13px;color:var(--smoke)}
  .logout{background:none;border:1px solid var(--line-s);color:var(--ink-s);font-family:inherit;font-size:12px;padding:8px 16px;border-radius:100px;cursor:pointer}
  .logout:hover{border-color:var(--ink)}

  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:28px}
  @media(max-width:680px){.stats{grid-template-columns:repeat(2,1fr)}}
  .stat{background:var(--sand-w);border:1px solid var(--line);border-radius:14px;padding:18px}
  .stat-v{font-family:Georgia,serif;font-size:30px;font-weight:500;letter-spacing:-1px;line-height:1}
  .stat-l{font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--smoke);margin-top:6px}
  .stat.hl .stat-v{color:var(--terracotta)}

  .section-h{font-family:'JetBrains Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:.18em;color:var(--smoke);margin:24px 0 12px}

  .rest{background:var(--sand-w);border:1px solid var(--line);border-radius:14px;padding:18px 20px;margin-bottom:12px;display:flex;align-items:center;gap:18px;flex-wrap:wrap}
  .rest.pending{border-color:var(--ochre);box-shadow:0 0 0 1px rgba(200,155,79,.3)}
  .rest-main{flex:1;min-width:200px}
  .rest-name{font-family:Georgia,serif;font-size:19px;font-weight:500;letter-spacing:-.3px}
  .rest-meta{font-size:12.5px;color:var(--smoke);margin-top:3px}
  .rest-owner{font-size:12px;color:var(--ink-s);margin-top:6px}
  .rest-stats{display:flex;gap:20px;font-size:12px;color:var(--ink-s)}
  .rest-stats b{display:block;font-family:Georgia,serif;font-size:18px;font-weight:500;color:var(--ink)}
  .pill{display:inline-block;font-family:'JetBrains Mono',monospace;font-size:9px;text-transform:uppercase;letter-spacing:.12em;padding:3px 9px;border-radius:100px;margin-top:8px}
  .pill.pending{background:rgba(200,155,79,.18);color:#8A6A1F}
  .pill.active{background:rgba(107,122,79,.18);color:#4E5C37}
  .pill.paused{background:rgba(142,125,107,.18);color:#6A5C4A}
  .pill.closed{background:rgba(197,87,44,.12);color:#9E4220}
  .pill.stripe-no{background:rgba(197,87,44,.1);color:#9E4220}
  .pill.stripe-yes{background:rgba(107,122,79,.15);color:#4E5C37}
  .rest-actions{display:flex;gap:8px;flex-wrap:wrap}
  .act{font-family:inherit;font-size:12px;font-weight:600;padding:9px 16px;border-radius:100px;cursor:pointer;border:none;transition:all .15s}
  .act-activate{background:var(--olive);color:#fff}
  .act-activate:hover{filter:brightness(1.08)}
  .act-pause{background:none;border:1px solid var(--line-s);color:var(--ink-s)}
  .act-pause:hover{border-color:var(--ink)}
  .empty{text-align:center;padding:40px;color:var(--smoke);font-size:14px}
  .loading{text-align:center;padding:40px;color:var(--smoke);font-size:14px}
  .toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%) translateY(20px);background:var(--ink);color:var(--sand);padding:13px 22px;border-radius:100px;font-size:13px;font-weight:500;box-shadow:0 12px 32px rgba(42,31,23,.3);opacity:0;pointer-events:none;transition:all .25s;z-index:100}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <div class="logo">Rain<span>back</span></div>
    <div class="badge">Admin</div>
    <h1>Platform <em>control.</em></h1>
    <p class="sub">Sign in to review and activate restaurants on the platform.</p>
    <div class="err" id="login-err"></div>
    <input type="email" id="email" placeholder="Admin email" autocomplete="email"/>
    <input type="password" id="password" placeholder="Password" autocomplete="current-password"/>
    <button class="btn" id="login-btn" onclick="login()">Log in →</button>
  </div>
</div>

<!-- DASHBOARD -->
<div id="admin-screen">
  <div class="wrap">
    <div class="topbar">
      <div class="logo">Rain<span>back</span> <span style="font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.18em;color:var(--smoke)">ADMIN</span></div>
      <div class="topbar-r">
        <span class="who" id="who"></span>
        <button class="logout" onclick="logout()">Log out</button>
      </div>
    </div>

    <div class="stats" id="stats"></div>

    <div class="section-h">Pending — waiting for your approval</div>
    <div id="pending-list"><div class="loading">Loading…</div></div>

    <div class="section-h">Live &amp; other restaurants</div>
    <div id="other-list"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = 'https://rainback-backend-production.up.railway.app';
let TOKEN = localStorage.getItem('rb_admin_token') || null;

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(window._tt); window._tt = setTimeout(()=>t.classList.remove('show'), 2800);
}

async function api(path, opts={}){
  const res = await fetch(API + path, {
    method: opts.method || 'GET',
    headers: { 'Content-Type':'application/json', ...(TOKEN ? { Authorization: 'Bearer ' + TOKEN } : {}) },
    body: opts.body ? JSON.stringify(opts.body) : undefined,
  });
  if (!res.ok){ const e = await res.json().catch(()=>({})); throw new Error(e.error || ('Error ' + res.status)); }
  return res.json();
}

async function login(){
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const err = document.getElementById('login-err');
  err.classList.remove('show');
  if (!email || !password){ err.textContent='Enter your email and password.'; err.classList.add('show'); return; }
  const btn = document.getElementById('login-btn');
  btn.disabled = true; btn.textContent = 'Logging in…';
  try {
    const data = await api('/api/auth/login', { method:'POST', body:{ email, password } });
    if (data.user.role !== 'admin'){
      err.textContent = 'This account is not an admin.'; err.classList.add('show');
      btn.disabled=false; btn.textContent='Log in →'; return;
    }
    TOKEN = data.token;
    localStorage.setItem('rb_admin_token', TOKEN);
    document.getElementById('who').textContent = data.user.first_name + ' ' + data.user.last_name;
    enterAdmin();
  } catch(e){
    err.textContent = e.message || 'Login failed'; err.classList.add('show');
    btn.disabled=false; btn.textContent='Log in →';
  }
}

function logout(){
  TOKEN = null; localStorage.removeItem('rb_admin_token');
  document.getElementById('admin-screen').style.display='none';
  document.getElementById('login-screen').style.display='flex';
}

async function enterAdmin(){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('admin-screen').style.display='block';
  loadStats();
  loadRestaurants();
}

async function loadStats(){
  try {
    const s = await api('/api/admin/stats');
    document.getElementById('stats').innerHTML = `
      <div class="stat hl"><div class="stat-v">${s.pending}</div><div class="stat-l">Pending</div></div>
      <div class="stat"><div class="stat-v">${s.active}</div><div class="stat-l">Active</div></div>
      <div class="stat"><div class="stat-v">${s.total_members}</div><div class="stat-l">Members</div></div>
      <div class="stat"><div class="stat-v">$${Math.round(s.total_revenue||0)}</div><div class="stat-l">Rainback revenue</div></div>`;
  } catch(e){ console.error(e); }
}

async function loadRestaurants(){
  const pendingEl = document.getElementById('pending-list');
  const otherEl = document.getElementById('other-list');
  try {
    const all = await api('/api/admin/restaurants');
    const pending = all.filter(r => r.status === 'pending');
    const other = all.filter(r => r.status !== 'pending');
    pendingEl.innerHTML = pending.length ? pending.map(card).join('') :
      '<div class="empty">No restaurants waiting. All caught up. ✓</div>';
    otherEl.innerHTML = other.length ? other.map(card).join('') :
      '<div class="empty">No active restaurants yet.</div>';
  } catch(e){
    pendingEl.innerHTML = '<div class="empty">Couldn\'t load. <a onclick="loadRestaurants()" style="color:var(--tc);cursor:pointer">Retry</a></div>';
  }
}

function card(r){
  const stripe = r.stripe_onboarded
    ? '<span class="pill stripe-yes">Bank ✓</span>'
    : '<span class="pill stripe-no">No bank yet</span>';
  const actions = r.status === 'active'
    ? `<button class="act act-pause" onclick="setStatus('${r.id}','paused')">Pause</button>`
    : `<button class="act act-activate" onclick="setStatus('${r.id}','active')">Activate →</button>`;
  return `
    <div class="rest ${r.status === 'pending' ? 'pending' : ''}">
      <div class="rest-main">
        <div class="rest-name">${r.name}</div>
        <div class="rest-meta">${r.neighborhood ? r.neighborhood + ' · ' : ''}${r.city} · ${r.cuisine || ''}</div>
        <div class="rest-owner">${r.first_name} ${r.last_name} · ${r.owner_email}</div>
        <span class="pill ${r.status}">${r.status}</span> ${stripe}
      </div>
      <div class="rest-stats">
        <div><b>${r.members_sold}</b>members</div>
        <div><b>$${Math.round(r.membership_price)}</b>price</div>
        <div><b>${r.membership_cap}</b>cap</div>
      </div>
      <div class="rest-actions">${actions}</div>
    </div>`;
}

async function setStatus(id, status){
  try {
    await api('/api/admin/restaurants/' + id + '/status', { method:'PATCH', body:{ status } });
    showToast(status === 'active' ? 'Restaurant activated ✓ — now on the map' : 'Restaurant paused');
    loadStats(); loadRestaurants();
  } catch(e){ showToast(e.message || 'Could not update'); }
}

// Auto-login if token present
if (TOKEN){
  api('/api/auth/me').then(u => {
    if (u && u.role === 'admin'){
      document.getElementById('who').textContent = u.first_name + ' ' + u.last_name;
      enterAdmin();
    } else { logout(); }
  }).catch(() => logout());
}
</script>
</body>
</html>
